name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build macOS app
        run: |
          python -m PyInstaller \
            --name "bzton-crawler" \
            --noconfirm \
            --clean \
            --windowed \
            --onedir \
            --add-data "app.py:." \
            --add-data "scraper.py:." \
            --hidden-import streamlit \
            --hidden-import streamlit.web.cli \
            --hidden-import streamlit.runtime.scriptrunner.magic_funcs \
            --hidden-import pandas \
            --hidden-import requests \
            --hidden-import openpyxl \
            --collect-all streamlit \
            --collect-all pandas \
            launcher.py

      - name: Create ZIP
        run: |
          cd dist
          zip -r ../bzton-crawler-macos.zip bzton-crawler/

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: bzton-crawler-macos.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows exe
        run: |
          python -m PyInstaller --name "bzton-crawler" --noconfirm --clean --windowed --onedir --add-data "app.py;." --add-data "scraper.py;." --hidden-import streamlit --hidden-import streamlit.web.cli --hidden-import streamlit.runtime.scriptrunner.magic_funcs --hidden-import pandas --hidden-import requests --hidden-import openpyxl --collect-all streamlit --collect-all pandas launcher.py

      - name: Create ZIP
        run: |
          Compress-Archive -Path dist\bzton-crawler -DestinationPath bzton-crawler-windows.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: bzton-crawler-windows.zip

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-build

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bzton-crawler-macos.zip
            bzton-crawler-windows.zip
          generate_release_notes: true
