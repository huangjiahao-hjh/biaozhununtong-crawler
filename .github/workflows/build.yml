name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build macOS app
        run: pyinstaller --onefile --name "bzton-crawler" --add-data "scraper.py:." --add-data "app.py:." --hidden-import streamlit --hidden-import streamlit.web.cli --hidden-import pandas --hidden-import openpyxl --hidden-import requests --hidden-import tkinter launcher.py

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: dist/bzton-crawler

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows exe
        run: pyinstaller --onefile --name "bzton-crawler" --add-data "scraper.py;." --add-data "app.py;." --hidden-import streamlit --hidden-import streamlit.web.cli --hidden-import pandas --hidden-import openpyxl --hidden-import requests --hidden-import tkinter launcher.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/bzton-crawler.exe

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-build

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build

      - name: Rename files
        run: |
          mv bzton-crawler bzton-crawler-macos
          chmod +x bzton-crawler-macos

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bzton-crawler-macos
            bzton-crawler.exe
          generate_release_notes: true
